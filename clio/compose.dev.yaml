# Development override for compose.yaml
# Usage: docker compose -f compose.yaml -f compose.dev.yaml up

services:
  nginx-proxy:
    ports:
      - "8080:80" # Use different port to avoid conflicts
      - "8443:443"

  frontend:
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
      - VITE_RELATION_SERVICE_URL=http://localhost:8080/relation-service/api
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent overwriting node_modules
    command: npm run dev -- --host 0.0.0.0

  backend:
    environment:
      - DEBUG=True
      - DJANGO_LOG_LEVEL=DEBUG
      - CORS_ALLOW_ALL_ORIGINS=True
      - POSTGRES_SSL=false  # dev db has no SSL
    volumes:
      - ./backend:/app
      - /app/venv # Prevent overwriting virtual environment
    ports:
      - "8001:3001" # Expose for direct access
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:3001
      "

  relation-service:
    environment:
      - DEBUG=True
      - LOG_LEVEL=DEBUG
    volumes:
      - ./relation_service:/app
    ports:
      - "8002:3002" # Expose for direct access

  db:
    ports:
      - "5432:5432" # Expose for local development tools
    environment:
      - POSTGRES_DB=redteamlogger_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    command: >
      postgres
      -c log_statement=all
      -c log_min_duration_statement=0
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=100

  redis:
    ports:
      - "6379:6379" # Expose for local development tools
    volumes:
      - redis_dev_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy noeviction
      --save 60 1000

volumes:
  redis_dev_data:
  postgres_dev_data:
