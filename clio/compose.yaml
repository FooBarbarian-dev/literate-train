services:
  nginx-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      # NOTE (PoC): Port 443 / TLS removed. In production expose 443 and mount TLS certs.
    networks:
      - frontend-network
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=/api
      - VITE_RELATION_SERVICE_URL=/relation-service/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - evidence_files:/app/evidence
      - ./backend/data:/app/data
      - ./backend/exports:/app/exports
      # NOTE (PoC): TLS cert volume removed. In production mount ./certs:/app/certs:ro
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./backend/.env

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend worker --loglevel=info
    volumes:
      - evidence_files:/app/evidence
      - ./backend/data:/app/data
      # NOTE (PoC): TLS cert volume removed. In production mount ./certs:/app/certs:ro
    networks:
      - backend-network
    depends_on:
      - redis
      - db
    restart: unless-stopped
    env_file:
      - ./backend/.env

  relation-service:
    build:
      context: ./relation_service
      dockerfile: Dockerfile
    expose:
      - "3002"
    volumes:
      - ./relation_service/data:/app/data
      - ./relation_service/logs:/app/logs
      # NOTE (PoC): TLS cert volume removed. In production mount ./certs:/app/certs:ro
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./relation_service/.env

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      # NOTE (PoC): TLS cert volume removed. In production mount ./certs/redis:/tls:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      # NOTE (PoC): Plain connection without TLS. In production use --tls with certs.
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction

  db:
    image: postgres:18-alpine
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # NOTE (PoC): TLS cert volume removed. In production mount ./certs/postgres:/var/lib/postgresql/certs:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clio} -d ${POSTGRES_DB:-redteamlogger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redteamlogger}
      POSTGRES_USER: ${POSTGRES_USER:-clio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c log_statement=all
      -c log_min_duration_statement=0
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  redis_data:
  postgres_data:
  evidence_files:
