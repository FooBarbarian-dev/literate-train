services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    expose:
      - "3001"
    volumes:
      - evidence_files:/app/evidence
      - ./backend/data:/app/data
      - ./backend/exports:/app/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    env_file:
      - ./backend/.env

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    command: celery -A backend worker --loglevel=info -c 2
    volumes:
      - evidence_files:/app/evidence
      - ./backend/data:/app/data
    depends_on:
      - redis
      - db
    restart: unless-stopped
    env_file:
      - ./backend/.env

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction

  db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clio} -d ${POSTGRES_DB:-redteamlogger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redteamlogger}
      POSTGRES_USER: ${POSTGRES_USER:-clio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  redis_data:
  postgres_data:
  evidence_files:
