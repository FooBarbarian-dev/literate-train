services:
  nginx-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    networks:
      - frontend-network
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=/api
      - VITE_RELATION_SERVICE_URL=/relation-service/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - evidence_files:/app/evidence
      - ./backend/data:/app/data
      - ./backend/exports:/app/exports
      - ./certs:/app/certs:ro
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./backend/.env

  relation-service:
    build:
      context: ./relation_service
      dockerfile: Dockerfile
    expose:
      - "3002"
    volumes:
      - ./relation_service/data:/app/data
      - ./relation_service/logs:/app/logs
      - ./certs:/app/certs:ro
    networks:
      - frontend-network
      - backend-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./relation_service/.env

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./certs/redis:/tls:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/tls/redis.crt", "--key", "/tls/redis.key", "--cacert", "/tls/ca.crt", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients no
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction

  db:
    image: postgres:17
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clio} -d ${POSTGRES_DB:-redteamlogger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-redteamlogger}
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/certs/server.crt
      -c ssl_key_file=/var/lib/postgresql/certs/server.key

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  redis_data:
  postgres_data:
  evidence_files:
