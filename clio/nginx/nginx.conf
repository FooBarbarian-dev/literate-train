worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Upstream definitions
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:3001;
    }

    upstream relation-service {
        server relation-service:3002;
    }

    # NOTE (PoC): SSL/TLS terminated here in production. Skipped for convenience.
    # In production: add HTTPS server block with TLS certs, redirect HTTP -> HTTPS,
    # and enforce HSTS. See git history for the full SSL configuration.
    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # Common proxy headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket support headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;

        # Backend API
        location /api/ {
            proxy_pass http://backend;
        }

        # Relation service API (strip /relation-service prefix)
        location /relation-service/api/ {
            proxy_pass http://relation-service/api/;
        }

        # Health check
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Frontend (default)
        location / {
            proxy_pass http://frontend;
        }
    }
}
