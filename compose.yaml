services:
  # ---------------------------------------------------------------------------
  # IMPORTANT — env var layering
  # ---------------------------------------------------------------------------
  # Two .env files are used; run `clio-env` once to generate both:
  #
  #   .env              (repo root, beside this file)
  #     POSTGRES_PASSWORD, REDIS_PASSWORD, etc.
  #     → used by Compose for ${VAR} substitution below
  #     → controls what password the db and redis containers start with
  #
  #   clio/backend/.env (service env for Django + Celery)
  #     DJANGO_*, POSTGRES_HOST/PORT/DB/USER/PASSWORD, REDIS_URL, JWT_SECRET …
  #     → injected into the backend and celery_worker containers at runtime
  #
  # db and redis do NOT have env_file entries — they get their credentials
  # from the ${VAR} substitution above.  If the root .env is missing Compose
  # will stop with a clear error (see :? syntax on POSTGRES_PASSWORD /
  # REDIS_PASSWORD below).
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./clio/frontend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./clio
      dockerfile: backend/Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - 3001:3001
    volumes:
      - evidence_files:/app/evidence
      - ./clio/backend/data:/app/data
      - ./clio/backend/exports:/app/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      RUN_STARTUP_SCRIPTS: "true"
    env_file:
      - ./clio/backend/.env

  celery_worker:
    build:
      context: ./clio
      dockerfile: backend/Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    command: celery -A backend worker --loglevel=info -c 2
    volumes:
      - evidence_files:/app/evidence
      - ./clio/backend/data:/app/data
    depends_on:
      - redis
      - db
    restart: unless-stopped
    env_file:
      - ./clio/backend/.env

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Root .env missing - run 'clio-env' first}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction

  db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clio} -d ${POSTGRES_DB:-redteamlogger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redteamlogger}
      POSTGRES_USER: ${POSTGRES_USER:-clio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Root .env missing - run 'clio-env' first}

volumes:
  redis_data:
  postgres_data:
  evidence_files:
