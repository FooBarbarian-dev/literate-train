<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVE &amp; ATT&amp;CK Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    header {
      width: 100%;
      max-width: 800px;
      padding: 1.25rem 1rem 0.5rem;
      border-bottom: 1px solid #2d3748;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #63b3ed; }
    header p  { font-size: 0.8rem; color: #718096; margin-top: 0.25rem; }

    #chat-box {
      width: 100%;
      max-width: 800px;
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      max-width: 85%;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }
    .msg.user {
      align-self: flex-end;
      background: #2b4c7e;
      color: #e2e8f0;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1a202c;
      border: 1px solid #2d3748;
      color: #e2e8f0;
    }
    .msg.error {
      align-self: flex-start;
      background: #2d1515;
      border: 1px solid #c53030;
      color: #fc8181;
    }
    .msg.thinking {
      align-self: flex-start;
      color: #718096;
      font-style: italic;
      font-size: 0.85rem;
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid #2d3748;
    }
    #user-input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid #4a5568;
      border-radius: 6px;
      background: #1a202c;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 140px;
    }
    #user-input:focus { border-color: #63b3ed; }
    #send-btn {
      padding: 0.6rem 1.2rem;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      align-self: flex-end;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #2b6cb0; }
    #send-btn:disabled { background: #4a5568; cursor: not-allowed; }

    #thread-info {
      width: 100%;
      max-width: 800px;
      padding: 0.35rem 1rem;
      font-size: 0.75rem;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <header>
    <h1>CVE &amp; ATT&amp;CK Chat</h1>
    <p>Ask about MITRE ATT&CK techniques or NVD CVEs. Backed by local vLLM + RAG.</p>
  </header>

  <div id="thread-info">Thread: <span id="thread-id-display">new</span></div>

  <div id="chat-box" role="log" aria-live="polite"></div>

  <div id="input-area">
    <textarea
      id="user-input"
      placeholder="Ask about a CVE, technique ID, or threat scenario…"
      rows="1"
      aria-label="Message input"
    ></textarea>
    <button id="send-btn" type="button">Send</button>
  </div>

  <script>
    const chatBox    = document.getElementById('chat-box');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const threadDisp = document.getElementById('thread-id-display');

    let threadId = null;
    const API_URL = '/api/chat/';

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function appendMsg(role, text) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.textContent = text;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMsg('user', text);
      const thinking = appendMsg('thinking', 'Thinking…');

      try {
        const resp = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: threadId }),
        });

        const data = await resp.json();
        thinking.remove();

        if (!resp.ok) {
          appendMsg('error', `Error ${resp.status}: ${data.error || resp.statusText}`);
        } else {
          threadId = data.thread_id;
          threadDisp.textContent = threadId;
          appendMsg('assistant', data.reply || '(empty response)');
        }
      } catch (err) {
        thinking.remove();
        appendMsg('error', `Network error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
